<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Governance Sites - PT Pegadaian</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f5faf7; 
            margin: 0; 
            padding: 20px; 
            color: #333;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        
        h1 { text-align: center; color: #006633; margin-bottom: 20px; font-size: 32px; }
        
        .intro-card {
            background: #ffffff;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            line-height: 1.6;
            color: #4a5568;
            text-align: center;
            font-size: 16px;
            border-top: 4px solid #006633;
        }

        .search-container {
            text-align: center;
            margin-bottom: 30px;
        }
        .search-input {
            width: 100%;
            max-width: 600px;
            padding: 14px 24px;
            font-size: 16px;
            border: 2px solid #cbd5e0;
            border-radius: 30px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-family: inherit;
        }
        .search-input:focus {
            border-color: #006633;
            box-shadow: 0 4px 15px rgba(0, 102, 51, 0.2);
        }

        .banner { 
            background: #006633; 
            padding: 15px; 
            border-radius: 12px; 
            text-align: center; 
            font-weight: bold; 
            font-size: 18px;
            margin-bottom: 25px; 
            color: #ffffff; 
            box-shadow: 0 4px 12px rgba(0, 102, 51, 0.15);
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
        }
        
        @media (max-width: 1100px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 850px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 550px) { .grid { grid-template-columns: 1fr; } .intro-card { padding: 20px; } }

        .col { border-radius: 18px; padding: 16px; transition: all 0.3s ease; }
        .h { display: block; text-decoration: none; color: #fff; padding: 14px; border-radius: 12px; font-weight: bold; text-align: center; margin-bottom: 15px; font-size: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .card { 
            display: block; 
            text-decoration: none; 
            background: #fff; 
            color: #2d3748; 
            padding: 12px 15px; 
            border-radius: 10px; 
            margin-bottom: 10px; 
            box-shadow: 0 2px 8px rgba(0,0,0,.06); 
            transition: all 0.2s ease; 
            border-left: 4px solid transparent; 
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,.1); border-left-color: inherit; color: #000; }
        .small { font-size: 12px; font-weight: bold; color: #7f8c8d; margin-bottom: 4px; }
        
        /* Palet Warna Kolom */
        .green { background: #e8f5e9; border: 1px solid #c8e6c9; } .green .h { background: #4caf50; } .green .card:hover { border-left-color: #4caf50; }
        .orange { background: #fff3e0; border: 1px solid #ffe0b2; } .orange .h { background: #ff9800; } .orange .card:hover { border-left-color: #ff9800; }
        .blue { background: #e3f2fd; border: 1px solid #bbdefb; } .blue .h { background: #2196f3; } .blue .card:hover { border-left-color: #2196f3; }
        .purple { background: #f3e5f5; border: 1px solid #e1bee7; } .purple .h { background: #9c27b0; } .purple .card:hover { border-left-color: #9c27b0; }
        .red { background: #ffebee; border: 1px solid #ffcdd2; } .red .h { background: #f44336; } .red .card:hover { border-left-color: #f44336; }
        .teal { background: #e0f2f1; border: 1px solid #b2dfdb; } .teal .h { background: #009688; } .teal .card:hover { border-left-color: #009688; }
        .indigo { background: #e8eaf6; border: 1px solid #c5cae9; } .indigo .h { background: #3f51b5; } .indigo .card:hover { border-left-color: #3f51b5; }
        .pink { background: #fce4ec; border: 1px solid #f8bbd0; } .pink .h { background: #e91e63; } .pink .card:hover { border-left-color: #e91e63; }
        .gray { background: #eceff1; border: 1px solid #cfd8dc; } .gray .h { background: #607d8b; } .gray .card:hover { border-left-color: #607d8b; }
        .cyan { background: #e0f7fa; border: 1px solid #b2ebf2; } .cyan .h { background: #00bcd4; } .cyan .card:hover { border-left-color: #00bcd4; }
        .brown { background: #efebe9; border: 1px solid #d7ccc8; } .brown .h { background: #795548; } .brown .card:hover { border-left-color: #795548; }
    </style>
</head>
<body>

<div class="container">
    <center><h2 id="docTitle" style="color: #006633;">Loading Title...</h2></center>

    <div class="intro-card" id="docIntro">
        Loading description...
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Cari Pedoman atau Juklak di sini..." onkeyup="filterData()">
    </div>

    <div class="banner" id="docBanner">Loading Banner...</div>

    <div class="grid" id="policyGrid">
        <!-- Kartu-kartu akan dirender secara otomatis di sini dari JSON -->
    </div>
</div>

<script>
// Memanggil data dari file Arsitektur.json
fetch('Arsitektur.json')
    .then(response => response.json())
    .then(data => {
        // Render Text Header
        document.getElementById('docTitle').innerText = data.title;
        document.getElementById('docIntro').innerText = data.introduction;
        document.getElementById('docBanner').innerText = data.banner;

        // Render Grid Categories
        const grid = document.getElementById('policyGrid');
        grid.innerHTML = ''; // Kosongkan container

        data.categories.forEach(cat => {
            let colDiv = document.createElement('div');
            colDiv.className = `col ${cat.color}`;

            let headerLink = document.createElement('a');
            headerLink.className = 'h';
            headerLink.target = '_blank';
            headerLink.href = cat.url;
            headerLink.innerText = cat.title;
            colDiv.appendChild(headerLink);

            cat.items.forEach(item => {
                let cardLink = document.createElement('a');
                cardLink.className = 'card';
                cardLink.target = '_blank';
                cardLink.href = item.url;
                cardLink.innerHTML = `<div class="small">${item.code}</div>${item.title}`;
                colDiv.appendChild(cardLink);
            });

            grid.appendChild(colDiv);
        });
    })
    .catch(error => console.error('Gagal memuat data JSON:', error));

// Fungsi Pencarian
function filterData() {
    let input = document.getElementById('searchInput').value.toLowerCase();
    let columns = document.querySelectorAll('.col');

    columns.forEach(function(col) {
        let header = col.querySelector('.h');
        let headerText = header.textContent.toLowerCase();
        
        let cards = col.querySelectorAll('.card');
        let matchFoundInCol = false;

        if (headerText.includes(input)) {
            matchFoundInCol = true;
            cards.forEach(function(card) {
                card.style.display = 'block';
            });
        } else {
            cards.forEach(function(card) {
                let cardText = card.textContent.toLowerCase();
                if (cardText.includes(input)) {
                    card.style.display = 'block';
                    matchFoundInCol = true;
                } else {
                    card.style.display = 'none';
                }
            });
        }

        if (matchFoundInCol) {
            col.style.display = 'block';
        } else {
            col.style.display = 'none';
        }
    });
}
</script>

</body>
</html>
